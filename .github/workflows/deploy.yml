name: Deploy Website

on:
  push:
    branches:
      - main  # Le déploiement se lancera dès que tu feras un push sur main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install & Build Astro
        run: |
          npm install
          npm run build

      - name: Sync files to Kimsufi
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist/*"
          target: "/home/ubuntu/goon-video-site/"
          strip_components: 1 # Pour copier le CONTENU de dist, pas le dossier lui-même

      - name: Refresh Docker Container
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/goon-video-site
            sudo docker compose up -d --force-recreate